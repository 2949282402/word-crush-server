version: "3.9"

services:
  mysql:
    image: mysql:8.4.7
    container_name: word-crush-mysql
    environment:
      MYSQL_DATABASE: word_crush
      MYSQL_USER: wordcrush
      MYSQL_PASSWORD: wordcrush123
      MYSQL_ROOT_PASSWORD: root123456
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: word-crush-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: word-crush-server
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      MYSQL_URL: jdbc:mysql://mysql:3306/word_crush?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      MYSQL_USERNAME: wordcrush
      MYSQL_PASSWORD: wordcrush123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: WordCrushJwtSecretKeyForResumeBuild1234567890
      JWT_EXPIRATION_HOURS: 168
      BOOTSTRAP_ADMIN_USERNAME: admin
      BOOTSTRAP_ADMIN_PASSWORD: 123456
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
