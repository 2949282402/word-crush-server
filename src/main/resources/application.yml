spring:
  application:
    name: hjl-blog
  datasource:
    url: jdbc:mysql://localhost:3306/hjl_blog
    username: root
    password: 123456
  jpa:
    hibernate:
      ddl-auto: create-drop #自动建表
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis:
  type-aliases-package: com.example.hjlblog.entiy